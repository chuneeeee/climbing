<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>볼더링 영상 자동 크롭</title>
  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#5a8fff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="볼더링 크롭" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 4px;
      letter-spacing: -0.5px;
    }
    .subtitle {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 28px;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      max-width: 720px;
      margin-bottom: 20px;
    }

    .card-title {
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #666;
      margin-bottom: 14px;
    }

    /* Drop zone */
    #dropzone {
      border: 2px dashed #333;
      border-radius: 12px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    #dropzone:hover, #dropzone.drag-over {
      border-color: #5a8fff;
      background: rgba(90,143,255,0.06);
    }
    #dropzone svg { opacity: 0.5; margin-bottom: 12px; }
    #dropzone p { color: #aaa; font-size: 0.9rem; }
    #dropzone span { color: #5a8fff; }
    #fileInput { display: none; }

    /* Padding option */
    .row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 14px;
    }
    .row label { font-size: 0.88rem; color: #aaa; flex: 1; }
    input[type=range] {
      flex: 2;
      accent-color: #5a8fff;
    }
    .row span { font-size: 0.88rem; color: #ccc; width: 36px; text-align: right; }

    /* Preview */
    .preview-wrap {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    .preview-box {
      flex: 1;
      min-width: 200px;
    }
    .preview-box p {
      font-size: 0.78rem;
      color: #666;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .preview-box canvas, .preview-box video {
      width: 100%;
      border-radius: 8px;
      background: #111;
      display: block;
    }

    /* Progress */
    #progressWrap {
      display: none;
      margin-top: 16px;
    }
    .progress-bar-bg {
      background: #222;
      border-radius: 8px;
      height: 8px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #5a8fff, #a78bfa);
      border-radius: 8px;
      transition: width 0.1s;
      width: 0%;
    }
    #progressLabel { font-size: 0.8rem; color: #888; margin-top: 6px; }

    /* Buttons */
    .btn-row { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
    button {
      padding: 12px 22px;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    #processBtn {
      background: linear-gradient(135deg, #5a8fff, #a78bfa);
      color: #fff;
      flex: 1;
    }
    #downloadBtn {
      background: #2a2a2a;
      color: #ccc;
      border: 1px solid #3a3a3a;
    }
    #resetBtn {
      background: #2a2a2a;
      color: #ccc;
      border: 1px solid #3a3a3a;
    }

    /* Status */
    #status {
      font-size: 0.82rem;
      color: #888;
      margin-top: 10px;
      min-height: 18px;
    }
    #status.error { color: #ff6b6b; }
    #status.ok { color: #6bffb8; }

    /* hidden helpers */
    #srcVideo { display: none; }

    /* Pose preview overlay */
    .pose-wrap {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      background: #111;
    }
    .pose-wrap video { width: 100%; display: block; border-radius: 0; background: none; }
    #poseOverlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }
    #poseBadge {
      position: absolute;
      top: 10px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
      font-size: 0.78rem; font-weight: 600;
      padding: 4px 14px; border-radius: 20px;
      white-space: nowrap;
    }
    #poseBadge.detected { color: #6bffb8; }
    #poseBadge.none     { color: #aaa; }

    footer {
      margin-top: 32px;
      font-size: 0.75rem;
      color: #444;
      text-align: center;
    }
    footer a { color: #5a8fff; text-decoration: none; }
  </style>
</head>
<body>

<h1>볼더링 영상 자동 크롭</h1>
<p class="subtitle">MediaPipe Pose로 사람을 감지해 자동으로 중앙 크롭합니다 · 서버에서 처리</p>

<!-- 파일 선택 -->
<div class="card">
  <div class="card-title">영상 파일 선택</div>
  <div id="dropzone" onclick="document.getElementById('fileInput').click()">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M15 10l-4 4-4-4M11 14V3"/>
      <rect x="2" y="17" width="20" height="4" rx="2"/>
    </svg>
    <p>클릭하거나 <span>파일을 드래그</span>해서 올려주세요</p>
    <p style="font-size:0.75rem;color:#555;margin-top:6px">MP4, MOV, WebM 등 브라우저 지원 포맷</p>
  </div>
  <input type="file" id="fileInput" accept="video/*" />
</div>

<!-- 출력 옵션 -->
<div class="card">
  <div class="card-title">출력 옵션 <span style="font-size:0.8rem;color:#888;font-weight:400">비율 4:5 고정</span></div>

  <div class="row">
    <label>여백 (패딩)</label>
    <input type="range" id="paddingRange" min="0" max="40" value="10" step="1" />
    <span id="paddingVal">10%</span>
  </div>

  <div class="row">
    <label>카메라 안정화 (1=빠름 / 30=안정)</label>
    <input type="range" id="smoothRange" min="1" max="30" value="5" step="1" />
    <span id="smoothVal">5f</span>
  </div>

  <div class="row">
    <label>출력 높이(px)</label>
    <input type="range" id="heightRange" min="480" max="3840" value="1350" step="120" />
    <span id="heightVal" style="width:50px">1350</span>
  </div>
</div>

<!-- 미리보기 -->
<div class="card" id="previewCard" style="display:none">
  <div class="card-title">포즈 미리보기</div>
  <div class="pose-wrap">
    <video id="srcVideo" muted playsinline></video>
    <canvas id="poseOverlay"></canvas>
    <div id="poseBadge" class="none">감지 중...</div>
  </div>
</div>

<!-- 처리 / 진행 -->
<div class="card">
  <div id="progressWrap">
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <div id="progressLabel">준비 중...</div>
  </div>

  <div class="btn-row">
    <button id="processBtn" disabled>처리 시작</button>
    <button id="downloadBtn" disabled>다운로드</button>
    <button id="resetBtn">초기화</button>
  </div>
  <div id="status"></div>
</div>

<footer>
  MediaPipe Pose · 서버(CPU)에서 처리됩니다 ·
  <a href="https://github.com/chuneeeee/climbing" target="_blank">GitHub</a>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
<script>
'use strict';

// ── Config ────────────────────────────────────────────────────────────────────
const API_BASE = (window.location.hostname === 'chuneeeee.github.io' ||
                  window.location.hostname === 'localhost' ||
                  window.location.hostname === '127.0.0.1')
  ? 'http://168.107.25.107/api'
  : '/api';

// ── State ─────────────────────────────────────────────────────────────────────
let videoFile = null;
const selectedRatio = '4:5';
let outputJobId = null;
let isProcessing = false;

const ratioMap = { '9:16': 9/16, '1:1': 1, '4:5': 4/5 };

// ── DOM refs ──────────────────────────────────────────────────────────────────
const dropzone      = document.getElementById('dropzone');
const fileInput     = document.getElementById('fileInput');
const processBtn    = document.getElementById('processBtn');
const downloadBtn   = document.getElementById('downloadBtn');
const resetBtn      = document.getElementById('resetBtn');
const previewCard   = document.getElementById('previewCard');
const srcVideo      = document.getElementById('srcVideo');
const poseOverlay   = document.getElementById('poseOverlay');
const poseBadge     = document.getElementById('poseBadge');
const progressWrap  = document.getElementById('progressWrap');
const progressFill  = document.getElementById('progressFill');
const progressLabel = document.getElementById('progressLabel');
const statusEl      = document.getElementById('status');
const paddingRange  = document.getElementById('paddingRange');
const paddingVal    = document.getElementById('paddingVal');
const smoothRange   = document.getElementById('smoothRange');
const smoothVal     = document.getElementById('smoothVal');
const heightRange   = document.getElementById('heightRange');
const heightVal     = document.getElementById('heightVal');

// ── Drag & drop ───────────────────────────────────────────────────────────────
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('video/')) loadFile(f);
});
fileInput.addEventListener('change', () => { if (fileInput.files[0]) loadFile(fileInput.files[0]); });


// ── Range inputs ──────────────────────────────────────────────────────────────
paddingRange.addEventListener('input', () => { paddingVal.textContent = paddingRange.value + '%'; if (lastLandmarks !== undefined && srcVideo.videoWidth) drawPoseOverlay(lastLandmarks); });
smoothRange.addEventListener('input', () => { smoothVal.textContent = smoothRange.value + 'f'; });
heightRange.addEventListener('input', () => { heightVal.textContent = heightRange.value; });

// ── MediaPipe Pose (preview only) ────────────────────────────────────────────
const POSE_CONNECTIONS = [
  [11,12],[11,13],[13,15],[12,14],[14,16], // arms
  [11,23],[12,24],[23,24],                 // torso
  [23,25],[25,27],[24,26],[26,28],         // legs
  [0,1],[1,2],[2,3],[3,7],[0,4],[4,5],[5,6],[6,8], // face
];

let poseDetector = null;
let lastLandmarks = null;

async function initPose() {
  if (poseDetector) return;
  poseDetector = new Pose({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
  poseDetector.setOptions({ modelComplexity: 1, smoothLandmarks: false,
    minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
  poseDetector.onResults(r => { lastLandmarks = r.poseLandmarks || null; });
  await poseDetector.initialize();
}

function drawPoseOverlay(landmarks) {
  const w = srcVideo.videoWidth, h = srcVideo.videoHeight;
  poseOverlay.width = w; poseOverlay.height = h;
  const ctx = poseOverlay.getContext('2d');
  ctx.clearRect(0, 0, w, h);

  if (!landmarks) {
    poseBadge.textContent = '포즈 감지 안 됨';
    poseBadge.className = 'none';
    // fallback: center crop box
    drawCropBoxOnOverlay(ctx, w, h, null);
    return;
  }

  poseBadge.textContent = '포즈 감지됨';
  poseBadge.className = 'detected';

  // skeleton connections
  ctx.strokeStyle = 'rgba(90,143,255,0.85)';
  ctx.lineWidth = Math.max(2, w / 400);
  for (const [a, b] of POSE_CONNECTIONS) {
    const la = landmarks[a], lb = landmarks[b];
    if ((la?.visibility ?? 0) > 0.3 && (lb?.visibility ?? 0) > 0.3) {
      ctx.beginPath();
      ctx.moveTo(la.x * w, la.y * h);
      ctx.lineTo(lb.x * w, lb.y * h);
      ctx.stroke();
    }
  }
  // dots
  const r = Math.max(3, w / 300);
  for (const l of landmarks) {
    if ((l.visibility ?? 0) > 0.3) {
      ctx.beginPath();
      ctx.arc(l.x * w, l.y * h, r, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.fill();
    }
  }

  drawCropBoxOnOverlay(ctx, w, h, landmarks);
}

function drawCropBoxOnOverlay(ctx, vidW, vidH, landmarks) {
  const ratio = ratioMap[selectedRatio];
  const padding = parseInt(paddingRange.value) / 100;
  let sx, sy, cw, ch;

  if (landmarks) {
    const pts = landmarks.filter(l => (l.visibility ?? 0) > 0.3);
    const xs = pts.map(l => l.x), ys = pts.map(l => l.y);
    const minX = Math.min(...xs), maxX = Math.max(...xs);
    const minY = Math.min(...ys), maxY = Math.max(...ys);
    const pw = (maxX - minX) * vidW, ph = (maxY - minY) * vidH;
    const px1 = Math.max(0, minX * vidW - pw * padding);
    const px2 = Math.min(vidW, maxX * vidW + pw * padding);
    const py1 = Math.max(0, minY * vidH - ph * padding);
    const py2 = Math.min(vidH, maxY * vidH + ph * padding);
    const padW = px2 - px1, padH = py2 - py1;
    ch = padH * 2.5; cw = ch * ratio;
    if (cw > vidW) { cw = vidW; ch = cw / ratio; }
    if (ch > vidH) { ch = vidH; cw = ch * ratio; }
    sx = Math.max(0, Math.min((px1 + px2) / 2 - cw / 2, vidW - cw));
    sy = Math.max(0, Math.min((py1 + py2) / 2 - ch / 2, vidH - ch));
  } else {
    cw = vidH * ratio; ch = vidH;
    if (cw > vidW) { cw = vidW; ch = cw / ratio; }
    sx = (vidW - cw) / 2; sy = (vidH - ch) / 2;
  }

  ctx.strokeStyle = '#5a8fff';
  ctx.lineWidth = Math.max(2, vidW / 300);
  ctx.setLineDash([]);
  ctx.strokeRect(sx, sy, cw, ch);
}

// ── Load file ─────────────────────────────────────────────────────────────────
function loadFile(file) {
  videoFile = file;
  outputJobId = null;
  downloadBtn.disabled = true;
  lastLandmarks = null;
  poseBadge.textContent = '감지 중...';
  poseBadge.className = 'none';
  srcVideo.src = URL.createObjectURL(file);
  srcVideo.load();
  srcVideo.onloadedmetadata = () => {
    previewCard.style.display = '';
    srcVideo.style.display = 'block';
    srcVideo.currentTime = 0;
    srcVideo.onseeked = runPosePreview;
    processBtn.disabled = false;
    setStatus('파일 로드 완료: ' + file.name, 'ok');
  };
}

async function runPosePreview() {
  if (!srcVideo.videoWidth) return;
  const w = srcVideo.videoWidth, h = srcVideo.videoHeight;
  // draw to offscreen canvas for MediaPipe
  const tmp = document.createElement('canvas');
  tmp.width = Math.min(w, 1280); tmp.height = Math.round(tmp.width * h / w);
  tmp.getContext('2d').drawImage(srcVideo, 0, 0, tmp.width, tmp.height);
  try {
    await initPose();
    await poseDetector.send({ image: tmp });
    drawPoseOverlay(lastLandmarks);
  } catch(e) {
    drawPoseOverlay(null);
  }
}

function drawPreviewFrame() { runPosePreview(); }

// ── Main processing (server-side) ─────────────────────────────────────────────
processBtn.addEventListener('click', () => {
  if (!videoFile || isProcessing) return;
  startProcessing();
});

async function startProcessing() {
  isProcessing = true;
  processBtn.disabled = true;
  downloadBtn.disabled = true;
  outputJobId = null;
  progressWrap.style.display = '';
  progressFill.style.width = '0%';
  progressLabel.textContent = '업로드 준비 중...';
  setStatus('업로드 중...', '');

  const formData = new FormData();
  formData.append('file', videoFile);
  formData.append('ratio', selectedRatio);
  formData.append('padding', (parseInt(paddingRange.value) / 100).toString());
  formData.append('smooth', smoothRange.value);
  formData.append('out_h', heightRange.value);

  let jobId;
  try {
    jobId = await new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open('POST', `${API_BASE}/process`);
      xhr.upload.onprogress = e => {
        if (e.lengthComputable) {
          const pct = (e.loaded / e.total * 45).toFixed(0);
          progressFill.style.width = pct + '%';
          const mb = (e.loaded / 1024 / 1024).toFixed(0);
          const total = (e.total / 1024 / 1024).toFixed(0);
          progressLabel.textContent = `업로드 중... ${pct}% (${mb}/${total}MB)`;
        }
      };
      xhr.onload = () => {
        if (xhr.status >= 200 && xhr.status < 300) {
          resolve(JSON.parse(xhr.responseText).job_id);
        } else {
          reject(new Error(`서버 오류 ${xhr.status}`));
        }
      };
      xhr.onerror = () => reject(new Error('네트워크 오류'));
      xhr.send(formData);
    });
    setStatus('서버에서 처리 중...', '');
  } catch (e) {
    setStatus('업로드 실패: ' + e.message, 'error');
    isProcessing = false;
    processBtn.disabled = false;
    return;
  }

  // Poll status every 2 seconds until done or error
  while (true) {
    await new Promise(r => setTimeout(r, 2000));
    let st;
    try {
      const res = await fetch(`${API_BASE}/status/${jobId}`);
      st = await res.json();
    } catch (e) {
      setStatus('상태 확인 실패: ' + e.message, 'error');
      isProcessing = false;
      processBtn.disabled = false;
      return;
    }

    progressFill.style.width = st.progress + '%';
    progressLabel.textContent = st.message;

    if (st.status === 'done') {
      outputJobId = jobId;
      downloadBtn.disabled = false;
      processBtn.disabled = false;
      isProcessing = false;
      setStatus('처리 완료!', 'ok');
      break;
    } else if (st.status === 'error') {
      setStatus(st.message, 'error');
      processBtn.disabled = false;
      isProcessing = false;
      break;
    }
  }
}

// ── Download ──────────────────────────────────────────────────────────────────
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
if (isIOS) downloadBtn.textContent = '사진에 저장';

downloadBtn.addEventListener('click', async () => {
  if (!outputJobId) return;
  const url = `${API_BASE}/download/${outputJobId}`;
  const filename = `cropped_${selectedRatio.replace(':', 'x')}.mp4`;

  // iOS: fetch blob → Web Share API → "사진에 저장"
  if (isIOS && navigator.share) {
    downloadBtn.disabled = true;
    setStatus('영상 불러오는 중...', '');
    try {
      const blob = await fetch(url).then(r => r.blob());
      const file = new File([blob], filename, { type: 'video/mp4' });
      await navigator.share({ files: [file], title: '볼더링 크롭' });
      setStatus('저장 완료!', 'ok');
    } catch (e) {
      if (e.name === 'AbortError') {
        setStatus('취소됨', '');
      } else {
        setStatus('공유 시트에서 "사진에 저장"을 선택하세요', '');
        window.open(url, '_blank');
      }
    } finally {
      downloadBtn.disabled = false;
    }
    return;
  }

  // 일반 브라우저: 파일 다운로드
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
});

// ── Reset ─────────────────────────────────────────────────────────────────────
resetBtn.addEventListener('click', () => {
  if (isProcessing) return;
  videoFile = null; outputJobId = null; lastLandmarks = null;
  srcVideo.src = ''; fileInput.value = '';
  poseOverlay.getContext('2d').clearRect(0, 0, poseOverlay.width, poseOverlay.height);
  previewCard.style.display = 'none';
  processBtn.disabled = true; downloadBtn.disabled = true;
  progressWrap.style.display = 'none';
  progressFill.style.width = '0%';
  setStatus('');
});

// ── Helpers ───────────────────────────────────────────────────────────────────
function setStatus(msg, type) {
  statusEl.textContent = msg;
  statusEl.className = type || '';
}
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
</body>
</html>
