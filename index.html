<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>볼더링 영상 자동 크롭</title>
  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#5a8fff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="볼더링 크롭" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 4px;
      letter-spacing: -0.5px;
    }
    .subtitle {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 28px;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      max-width: 720px;
      margin-bottom: 20px;
    }

    .card-title {
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #666;
      margin-bottom: 14px;
    }

    /* Drop zone */
    #dropzone {
      border: 2px dashed #333;
      border-radius: 12px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    #dropzone:hover, #dropzone.drag-over {
      border-color: #5a8fff;
      background: rgba(90,143,255,0.06);
    }
    #dropzone svg { opacity: 0.5; margin-bottom: 12px; }
    #dropzone p { color: #aaa; font-size: 0.9rem; }
    #dropzone span { color: #5a8fff; }
    #fileInput { display: none; }

    /* Ratio selector */
    .ratio-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .ratio-btn {
      flex: 1;
      min-width: 80px;
      background: #222;
      border: 2px solid #333;
      border-radius: 10px;
      color: #ccc;
      padding: 12px 8px;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      font-size: 0.88rem;
    }
    .ratio-btn:hover { border-color: #555; color: #fff; }
    .ratio-btn.active {
      border-color: #5a8fff;
      background: rgba(90,143,255,0.12);
      color: #fff;
    }
    .ratio-btn .label { font-weight: 700; font-size: 1rem; }
    .ratio-btn .desc { font-size: 0.72rem; color: #888; margin-top: 2px; }

    /* Padding option */
    .row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 14px;
    }
    .row label { font-size: 0.88rem; color: #aaa; flex: 1; }
    input[type=range] {
      flex: 2;
      accent-color: #5a8fff;
    }
    .row span { font-size: 0.88rem; color: #ccc; width: 36px; text-align: right; }

    /* Preview */
    .preview-wrap {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    .preview-box {
      flex: 1;
      min-width: 200px;
    }
    .preview-box p {
      font-size: 0.78rem;
      color: #666;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .preview-box canvas, .preview-box video {
      width: 100%;
      border-radius: 8px;
      background: #111;
      display: block;
    }

    /* Progress */
    #progressWrap {
      display: none;
      margin-top: 16px;
    }
    .progress-bar-bg {
      background: #222;
      border-radius: 8px;
      height: 8px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #5a8fff, #a78bfa);
      border-radius: 8px;
      transition: width 0.1s;
      width: 0%;
    }
    #progressLabel { font-size: 0.8rem; color: #888; margin-top: 6px; }

    /* Buttons */
    .btn-row { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
    button {
      padding: 12px 22px;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    #processBtn {
      background: linear-gradient(135deg, #5a8fff, #a78bfa);
      color: #fff;
      flex: 1;
    }
    #downloadBtn {
      background: #2a2a2a;
      color: #ccc;
      border: 1px solid #3a3a3a;
    }
    #resetBtn {
      background: #2a2a2a;
      color: #ccc;
      border: 1px solid #3a3a3a;
    }

    /* Status */
    #status {
      font-size: 0.82rem;
      color: #888;
      margin-top: 10px;
      min-height: 18px;
    }
    #status.error { color: #ff6b6b; }
    #status.ok { color: #6bffb8; }

    /* hidden helpers */
    #srcVideo { display: none; }
    #offCanvas { display: none; }

    footer {
      margin-top: 32px;
      font-size: 0.75rem;
      color: #444;
      text-align: center;
    }
    footer a { color: #5a8fff; text-decoration: none; }
  </style>
</head>
<body>

<h1>볼더링 영상 자동 크롭</h1>
<p class="subtitle">MediaPipe Pose로 사람을 감지해 자동으로 중앙 크롭합니다 · 서버에서 처리</p>

<!-- 파일 선택 -->
<div class="card">
  <div class="card-title">영상 파일 선택</div>
  <div id="dropzone" onclick="document.getElementById('fileInput').click()">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M15 10l-4 4-4-4M11 14V3"/>
      <rect x="2" y="17" width="20" height="4" rx="2"/>
    </svg>
    <p>클릭하거나 <span>파일을 드래그</span>해서 올려주세요</p>
    <p style="font-size:0.75rem;color:#555;margin-top:6px">MP4, MOV, WebM 등 브라우저 지원 포맷</p>
  </div>
  <input type="file" id="fileInput" accept="video/*" />
</div>

<!-- 출력 옵션 -->
<div class="card">
  <div class="card-title">출력 비율</div>
  <div class="ratio-group">
    <div class="ratio-btn active" data-ratio="9:16">
      <div class="label">9:16</div>
      <div class="desc">세로형 숏츠/릴스</div>
    </div>
    <div class="ratio-btn" data-ratio="1:1">
      <div class="label">1:1</div>
      <div class="desc">정사각형</div>
    </div>
    <div class="ratio-btn" data-ratio="4:5">
      <div class="label">4:5</div>
      <div class="desc">인스타그램</div>
    </div>
  </div>

  <div class="row">
    <label>여백 (패딩)</label>
    <input type="range" id="paddingRange" min="0" max="40" value="10" step="1" />
    <span id="paddingVal">10%</span>
  </div>

  <div class="row">
    <label>카메라 안정화 (1=빠름 / 30=안정)</label>
    <input type="range" id="smoothRange" min="1" max="30" value="5" step="1" />
    <span id="smoothVal">5f</span>
  </div>

  <div class="row">
    <label>출력 높이(px)</label>
    <input type="range" id="heightRange" min="480" max="3840" value="1920" step="120" />
    <span id="heightVal" style="width:50px">1920</span>
  </div>
</div>

<!-- 미리보기 -->
<div class="card" id="previewCard" style="display:none">
  <div class="card-title">미리보기</div>
  <div class="preview-wrap">
    <div class="preview-box">
      <p>원본</p>
      <video id="srcVideo" muted playsinline></video>
    </div>
    <div class="preview-box">
      <p>크롭 결과</p>
      <canvas id="previewCanvas"></canvas>
    </div>
  </div>
</div>

<!-- 처리 / 진행 -->
<div class="card">
  <div id="progressWrap">
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <div id="progressLabel">준비 중...</div>
  </div>

  <div class="btn-row">
    <button id="processBtn" disabled>처리 시작</button>
    <button id="downloadBtn" disabled>다운로드</button>
    <button id="resetBtn">초기화</button>
  </div>
  <div id="status"></div>
</div>

<footer>
  MediaPipe Pose · 서버(CPU)에서 처리됩니다 ·
  <a href="https://github.com/chuneeeee/climbing" target="_blank">GitHub</a>
</footer>

<script>
'use strict';

// ── Config ────────────────────────────────────────────────────────────────────
const API_BASE = (window.location.hostname === 'chuneeeee.github.io' ||
                  window.location.hostname === 'localhost' ||
                  window.location.hostname === '127.0.0.1')
  ? 'http://168.107.25.107/api'
  : '/api';

// ── State ─────────────────────────────────────────────────────────────────────
let videoFile = null;
let selectedRatio = '9:16';
let outputJobId = null;
let isProcessing = false;

const ratioMap = { '9:16': 9/16, '1:1': 1, '4:5': 4/5 };

// ── DOM refs ──────────────────────────────────────────────────────────────────
const dropzone      = document.getElementById('dropzone');
const fileInput     = document.getElementById('fileInput');
const processBtn    = document.getElementById('processBtn');
const downloadBtn   = document.getElementById('downloadBtn');
const resetBtn      = document.getElementById('resetBtn');
const previewCard   = document.getElementById('previewCard');
const srcVideo      = document.getElementById('srcVideo');
const previewCanvas = document.getElementById('previewCanvas');
const progressWrap  = document.getElementById('progressWrap');
const progressFill  = document.getElementById('progressFill');
const progressLabel = document.getElementById('progressLabel');
const statusEl      = document.getElementById('status');
const paddingRange  = document.getElementById('paddingRange');
const paddingVal    = document.getElementById('paddingVal');
const smoothRange   = document.getElementById('smoothRange');
const smoothVal     = document.getElementById('smoothVal');
const heightRange   = document.getElementById('heightRange');
const heightVal     = document.getElementById('heightVal');

// ── Drag & drop ───────────────────────────────────────────────────────────────
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('video/')) loadFile(f);
});
fileInput.addEventListener('change', () => { if (fileInput.files[0]) loadFile(fileInput.files[0]); });

// ── Ratio buttons ─────────────────────────────────────────────────────────────
const fhdHeightMap = { '9:16': 1920, '4:5': 1350, '1:1': 1080 };

document.querySelectorAll('.ratio-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.ratio-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedRatio = btn.dataset.ratio;
    const h = fhdHeightMap[selectedRatio];
    heightRange.value = h;
    heightVal.textContent = h;
    if (srcVideo.src) drawPreviewFrame();
  });
});

// ── Range inputs ──────────────────────────────────────────────────────────────
paddingRange.addEventListener('input', () => { paddingVal.textContent = paddingRange.value + '%'; });
smoothRange.addEventListener('input', () => { smoothVal.textContent = smoothRange.value + 'f'; });
heightRange.addEventListener('input', () => { heightVal.textContent = heightRange.value; });

// ── Load file ─────────────────────────────────────────────────────────────────
function loadFile(file) {
  videoFile = file;
  outputJobId = null;
  downloadBtn.disabled = true;
  srcVideo.src = URL.createObjectURL(file);
  srcVideo.load();
  srcVideo.onloadedmetadata = () => {
    previewCard.style.display = '';
    srcVideo.style.display = 'block';
    srcVideo.currentTime = 0;
    srcVideo.onseeked = drawPreviewFrame;
    processBtn.disabled = false;
    setStatus('파일 로드 완료: ' + file.name, 'ok');
  };
}

// ── Static preview (center crop, no pose) ─────────────────────────────────────
function drawPreviewFrame() {
  if (!srcVideo.videoWidth) return;
  const ratio = ratioMap[selectedRatio];
  const svw = srcVideo.videoWidth, svh = srcVideo.videoHeight;
  const outH = parseInt(heightRange.value);
  const outW = Math.round(outH * ratio);
  let cropW = svh * ratio, cropH = svh;
  if (cropW > svw) { cropW = svw; cropH = svw / ratio; }
  const sx = (svw - cropW) / 2, sy = (svh - cropH) / 2;
  previewCanvas.width = outW; previewCanvas.height = outH;
  previewCanvas.getContext('2d').drawImage(srcVideo, sx, sy, cropW, cropH, 0, 0, outW, outH);
}

// ── Main processing (server-side) ─────────────────────────────────────────────
processBtn.addEventListener('click', () => {
  if (!videoFile || isProcessing) return;
  startProcessing();
});

async function startProcessing() {
  isProcessing = true;
  processBtn.disabled = true;
  downloadBtn.disabled = true;
  outputJobId = null;
  progressWrap.style.display = '';
  progressFill.style.width = '0%';
  progressLabel.textContent = '업로드 준비 중...';
  setStatus('업로드 중...', '');

  const formData = new FormData();
  formData.append('file', videoFile);
  formData.append('ratio', selectedRatio);
  formData.append('padding', (parseInt(paddingRange.value) / 100).toString());
  formData.append('smooth', smoothRange.value);
  formData.append('out_h', heightRange.value);

  let jobId;
  try {
    jobId = await new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open('POST', `${API_BASE}/process`);
      xhr.upload.onprogress = e => {
        if (e.lengthComputable) {
          const pct = (e.loaded / e.total * 45).toFixed(0);
          progressFill.style.width = pct + '%';
          const mb = (e.loaded / 1024 / 1024).toFixed(0);
          const total = (e.total / 1024 / 1024).toFixed(0);
          progressLabel.textContent = `업로드 중... ${pct}% (${mb}/${total}MB)`;
        }
      };
      xhr.onload = () => {
        if (xhr.status >= 200 && xhr.status < 300) {
          resolve(JSON.parse(xhr.responseText).job_id);
        } else {
          reject(new Error(`서버 오류 ${xhr.status}`));
        }
      };
      xhr.onerror = () => reject(new Error('네트워크 오류'));
      xhr.send(formData);
    });
    setStatus('서버에서 처리 중...', '');
  } catch (e) {
    setStatus('업로드 실패: ' + e.message, 'error');
    isProcessing = false;
    processBtn.disabled = false;
    return;
  }

  // Poll status every 2 seconds until done or error
  while (true) {
    await new Promise(r => setTimeout(r, 2000));
    let st;
    try {
      const res = await fetch(`${API_BASE}/status/${jobId}`);
      st = await res.json();
    } catch (e) {
      setStatus('상태 확인 실패: ' + e.message, 'error');
      isProcessing = false;
      processBtn.disabled = false;
      return;
    }

    progressFill.style.width = st.progress + '%';
    progressLabel.textContent = st.message;

    if (st.status === 'done') {
      outputJobId = jobId;
      downloadBtn.disabled = false;
      processBtn.disabled = false;
      isProcessing = false;
      setStatus('처리 완료!', 'ok');
      break;
    } else if (st.status === 'error') {
      setStatus(st.message, 'error');
      processBtn.disabled = false;
      isProcessing = false;
      break;
    }
  }
}

// ── Download ──────────────────────────────────────────────────────────────────
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
if (isIOS) downloadBtn.textContent = '사진에 저장';

downloadBtn.addEventListener('click', async () => {
  if (!outputJobId) return;
  const url = `${API_BASE}/download/${outputJobId}`;
  const filename = `cropped_${selectedRatio.replace(':', 'x')}.mp4`;

  // iOS: fetch blob → Web Share API → "사진에 저장"
  if (isIOS && navigator.share) {
    downloadBtn.disabled = true;
    setStatus('영상 불러오는 중...', '');
    try {
      const blob = await fetch(url).then(r => r.blob());
      const file = new File([blob], filename, { type: 'video/mp4' });
      await navigator.share({ files: [file], title: '볼더링 크롭' });
      setStatus('저장 완료!', 'ok');
    } catch (e) {
      if (e.name === 'AbortError') {
        setStatus('취소됨', '');
      } else {
        setStatus('공유 시트에서 "사진에 저장"을 선택하세요', '');
        window.open(url, '_blank');
      }
    } finally {
      downloadBtn.disabled = false;
    }
    return;
  }

  // 일반 브라우저: 파일 다운로드
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
});

// ── Reset ─────────────────────────────────────────────────────────────────────
resetBtn.addEventListener('click', () => {
  if (isProcessing) return;
  videoFile = null; outputJobId = null;
  srcVideo.src = ''; fileInput.value = '';
  previewCard.style.display = 'none';
  processBtn.disabled = true; downloadBtn.disabled = true;
  progressWrap.style.display = 'none';
  progressFill.style.width = '0%';
  setStatus('');
});

// ── Helpers ───────────────────────────────────────────────────────────────────
function setStatus(msg, type) {
  statusEl.textContent = msg;
  statusEl.className = type || '';
}
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
</body>
</html>
