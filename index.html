<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>볼더링 영상 자동 크롭</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 4px;
      letter-spacing: -0.5px;
    }
    .subtitle {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 28px;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      max-width: 720px;
      margin-bottom: 20px;
    }

    .card-title {
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #666;
      margin-bottom: 14px;
    }

    #dropzone {
      border: 2px dashed #333;
      border-radius: 12px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    #dropzone:hover, #dropzone.drag-over {
      border-color: #5a8fff;
      background: rgba(90,143,255,0.06);
    }
    #dropzone svg { opacity: 0.5; margin-bottom: 12px; }
    #dropzone p { color: #aaa; font-size: 0.9rem; }
    #dropzone span { color: #5a8fff; }
    #fileInput { display: none; }

    .ratio-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .ratio-btn {
      flex: 1;
      min-width: 80px;
      background: #222;
      border: 2px solid #333;
      border-radius: 10px;
      color: #ccc;
      padding: 12px 8px;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      font-size: 0.88rem;
    }
    .ratio-btn:hover { border-color: #555; color: #fff; }
    .ratio-btn.active {
      border-color: #5a8fff;
      background: rgba(90,143,255,0.12);
      color: #fff;
    }
    .ratio-btn .label { font-weight: 700; font-size: 1rem; }
    .ratio-btn .desc { font-size: 0.72rem; color: #888; margin-top: 2px; }

    .row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 14px;
    }
    .row label { font-size: 0.88rem; color: #aaa; flex: 1; }
    input[type=range] {
      flex: 2;
      accent-color: #5a8fff;
    }
    .row span { font-size: 0.88rem; color: #ccc; width: 36px; text-align: right; }

    .preview-wrap {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    .preview-box {
      flex: 1;
      min-width: 200px;
    }
    .preview-box p {
      font-size: 0.78rem;
      color: #666;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .preview-box canvas, .preview-box video {
      width: 100%;
      border-radius: 8px;
      background: #111;
      display: block;
    }

    #progressWrap {
      display: none;
      margin-top: 16px;
    }
    .progress-bar-bg {
      background: #222;
      border-radius: 8px;
      height: 8px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #5a8fff, #a78bfa);
      border-radius: 8px;
      transition: width 0.1s;
      width: 0%;
    }
    #progressLabel { font-size: 0.8rem; color: #888; margin-top: 6px; }

    .btn-row { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
    button {
      padding: 12px 22px;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    #processBtn {
      background: linear-gradient(135deg, #5a8fff, #a78bfa);
      color: #fff;
      flex: 1;
    }
    #downloadBtn {
      background: #2a2a2a;
      color: #ccc;
      border: 1px solid #3a3a3a;
    }
    #resetBtn {
      background: #2a2a2a;
      color: #ccc;
      border: 1px solid #3a3a3a;
    }

    #status {
      font-size: 0.82rem;
      color: #888;
      margin-top: 10px;
      min-height: 18px;
    }
    #status.error { color: #ff6b6b; }
    #status.ok { color: #6bffb8; }

    #srcVideo { display: none; }
    #offCanvas { display: none; }

    footer {
      margin-top: 32px;
      font-size: 0.75rem;
      color: #444;
      text-align: center;
    }
    footer a { color: #5a8fff; text-decoration: none; }
  </style>
</head>
<body>

<h1>볼더링 영상 자동 크롭</h1>
<p class="subtitle">MediaPipe Pose로 사람을 감지해 자동으로 중앙 크롭합니다 · 브라우저 전용, 업로드 없음</p>

<div class="card">
  <div class="card-title">영상 파일 선택</div>
  <div id="dropzone" onclick="document.getElementById('fileInput').click()">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M15 10l-4 4-4-4M11 14V3"/>
      <rect x="2" y="17" width="20" height="4" rx="2"/>
    </svg>
    <p>클릭하거나 <span>파일을 드래그</span>해서 올려주세요</p>
    <p style="font-size:0.75rem;color:#555;margin-top:6px">MP4, MOV, WebM 등 브라우저 지원 포맷</p>
  </div>
  <input type="file" id="fileInput" accept="video/*" />
</div>

<div class="card">
  <div class="card-title">출력 비율</div>
  <div class="ratio-group">
    <div class="ratio-btn active" data-ratio="9:16">
      <div class="label">9:16</div>
      <div class="desc">세로형 숏츠/릴스</div>
    </div>
    <div class="ratio-btn" data-ratio="1:1">
      <div class="label">1:1</div>
      <div class="desc">정사각형</div>
    </div>
    <div class="ratio-btn" data-ratio="4:5">
      <div class="label">4:5</div>
      <div class="desc">인스타그램</div>
    </div>
  </div>

  <div class="row">
    <label>여백 미세조정</label>
    <input type="range" id="paddingRange" min="0" max="40" value="10" step="1" />
    <span id="paddingVal">10%</span>
  </div>

  <div class="row">
    <label>포즈 스무딩 (프레임 평균)</label>
    <input type="range" id="smoothRange" min="1" max="30" value="10" step="1" />
    <span id="smoothVal">10f</span>
  </div>

  <div class="row">
    <label>출력 높이(px)</label>
    <input type="range" id="heightRange" min="480" max="1920" value="1080" step="60" />
    <span id="heightVal" style="width:50px">1080</span>
  </div>
</div>

<div class="card" id="previewCard" style="display:none">
  <div class="card-title">미리보기</div>
  <div class="preview-wrap">
    <div class="preview-box">
      <p>원본</p>
      <video id="srcVideo" muted playsinline></video>
    </div>
    <div class="preview-box">
      <p>크롭 결과</p>
      <canvas id="previewCanvas"></canvas>
    </div>
  </div>
</div>

<div class="card">
  <div id="progressWrap">
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <div id="progressLabel">준비 중...</div>
  </div>

  <div class="btn-row">
    <button id="processBtn" disabled>처리 시작</button>
    <button id="downloadBtn" disabled>다운로드</button>
    <button id="resetBtn">초기화</button>
  </div>
  <div id="status"></div>
</div>

<canvas id="offCanvas"></canvas>
<canvas id="poseCanvas" style="display:none"></canvas>

<footer>
  MediaPipe Pose · 모든 처리는 브라우저에서만 이루어집니다 ·
  <a href="https://github.com/chuneeeee/climbing" target="_blank">GitHub</a>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

<script>
'use strict';

let videoFile = null;
let selectedRatio = '9:16';
let outputBlob = null;
let isProcessing = false;

const ratioMap = { '9:16': 9/16, '1:1': 1, '4:5': 4/5 };

const dropzone     = document.getElementById('dropzone');
const fileInput    = document.getElementById('fileInput');
const processBtn   = document.getElementById('processBtn');
const downloadBtn  = document.getElementById('downloadBtn');
const resetBtn     = document.getElementById('resetBtn');
const previewCard  = document.getElementById('previewCard');
const srcVideo     = document.getElementById('srcVideo');
const previewCanvas= document.getElementById('previewCanvas');
const offCanvas    = document.getElementById('offCanvas');
const progressWrap = document.getElementById('progressWrap');
const progressFill = document.getElementById('progressFill');
const progressLabel= document.getElementById('progressLabel');
const statusEl     = document.getElementById('status');
const paddingRange = document.getElementById('paddingRange');
const paddingVal   = document.getElementById('paddingVal');
const smoothRange  = document.getElementById('smoothRange');
const smoothVal    = document.getElementById('smoothVal');
const heightRange  = document.getElementById('heightRange');
const heightVal    = document.getElementById('heightVal');

dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('video/')) loadFile(f);
});
fileInput.addEventListener('change', () => { if (fileInput.files[0]) loadFile(fileInput.files[0]); });

document.querySelectorAll('.ratio-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.ratio-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedRatio = btn.dataset.ratio;
    if (srcVideo.src) drawPreviewFrame();
  });
});

paddingRange.addEventListener('input', () => { paddingVal.textContent = paddingRange.value + '%'; });
smoothRange.addEventListener('input', () => { smoothVal.textContent = smoothRange.value + 'f'; });
heightRange.addEventListener('input', () => { heightVal.textContent = heightRange.value; });

function loadFile(file) {
  videoFile = file;
  outputBlob = null;
  downloadBtn.disabled = true;
  srcVideo.src = URL.createObjectURL(file);
  srcVideo.load();
  srcVideo.onloadedmetadata = () => {
    previewCard.style.display = '';
    srcVideo.style.display = 'block';
    srcVideo.currentTime = 0;
    srcVideo.onseeked = drawPreviewFrame;
    processBtn.disabled = false;
    setStatus('파일 로드 완료: ' + file.name, 'ok');
  };
}

function drawPreviewFrame() {
  if (!srcVideo.videoWidth) return;
  const ratio = ratioMap[selectedRatio];
  const svw = srcVideo.videoWidth, svh = srcVideo.videoHeight;
  const outH = parseInt(heightRange.value);
  const outW = Math.round(outH * ratio);
  let cropW = svh * ratio, cropH = svh;
  if (cropW > svw) { cropW = svw; cropH = svw / ratio; }
  const sx = (svw - cropW) / 2, sy = (svh - cropH) / 2;
  previewCanvas.width = outW; previewCanvas.height = outH;
  const ctx = previewCanvas.getContext('2d');
  ctx.drawImage(srcVideo, sx, sy, cropW, cropH, 0, 0, outW, outH);
}

function getCropBox(landmarks, vidW, vidH, ratio, padding) {
  const pts = landmarks.filter(l => l.visibility > 0.3);
  if (!pts.length) return null;
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  for (const l of pts) {
    if (l.x < minX) minX = l.x;
    if (l.x > maxX) maxX = l.x;
    if (l.y < minY) minY = l.y;
    if (l.y > maxY) maxY = l.y;
  }
  const cx = (minX + maxX) / 2 * vidW;
  const cy = (minY + maxY) / 2 * vidH;

  // person occupies center cell of 3x3 grid → crop = 3x person height
  const personH = (maxY - minY) * vidH;
  let cropH = personH * 3 * (1 + padding * 0.1);
  let cropW = cropH * ratio;

  if (cropW > vidW) { cropW = vidW; cropH = cropW / ratio; }
  if (cropH > vidH) { cropH = vidH; cropW = cropH * ratio; }
  let sx = cx - cropW / 2;
  let sy = cy - cropH / 2;
  sx = Math.max(0, Math.min(sx, vidW - cropW));
  sy = Math.max(0, Math.min(sy, vidH - cropH));
  return { sx, sy, cropW, cropH };
}

function smoothBoxes(buf) {
  if (!buf.length) return null;
  const r = { sx: 0, sy: 0, cropW: 0, cropH: 0 };
  for (const b of buf) { r.sx += b.sx; r.sy += b.sy; r.cropW += b.cropW; r.cropH += b.cropH; }
  const n = buf.length;
  return { sx: r.sx/n, sy: r.sy/n, cropW: r.cropW/n, cropH: r.cropH/n };
}

processBtn.addEventListener('click', () => {
  if (!videoFile || isProcessing) return;
  startProcessing();
});

async function startProcessing() {
  isProcessing = true;
  processBtn.disabled = true;
  downloadBtn.disabled = true;
  progressWrap.style.display = '';
  setStatus('MediaPipe 초기화 중...', '');

  const ratio = ratioMap[selectedRatio];
  const padding = parseInt(paddingRange.value) / 100;
  const smoothN = parseInt(smoothRange.value);
  const outH = parseInt(heightRange.value);
  const outW = Math.round(outH * ratio);

  const vid = document.createElement('video');
  vid.src = URL.createObjectURL(videoFile);
  vid.muted = true;
  vid.playsInline = true;
  await new Promise(r => { vid.onloadedmetadata = r; });

  const vidW = vid.videoWidth, vidH = vid.videoHeight;
  const fps = 30;
  const duration = vid.duration;
  const totalFrames = Math.ceil(duration * fps);

  const poseInputCanvas = document.createElement('canvas');
  poseInputCanvas.width = vidW; poseInputCanvas.height = vidH;
  const poseCtx = poseInputCanvas.getContext('2d');

  offCanvas.width = outW; offCanvas.height = outH;
  const outCtx = offCanvas.getContext('2d');

  let stream, recorder, chunks = [];
  try {
    stream = offCanvas.captureStream(fps);
    recorder = new MediaRecorder(stream, {
      mimeType: getSupportedMimeType(),
      videoBitsPerSecond: 8_000_000,
    });
  } catch (e) {
    setStatus('MediaRecorder 지원 안 됨: ' + e.message, 'error');
    isProcessing = false; processBtn.disabled = false;
    return;
  }
  recorder.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
  recorder.start();

  let poseLandmarks = null;
  const pose = new Pose({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`
  });
  pose.setOptions({
    modelComplexity: 1,
    smoothLandmarks: true,
    enableSegmentation: false,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5,
  });
  pose.onResults(results => {
    poseLandmarks = results.poseLandmarks || null;
  });
  await pose.initialize();

  setStatus('영상 처리 중...', '');

  const boxBuf = [];

  for (let fi = 0; fi < totalFrames; fi++) {
    const t = fi / fps;
    if (t > duration) break;
    vid.currentTime = t;
    await new Promise(r => { vid.onseeked = r; });
    poseCtx.drawImage(vid, 0, 0, vidW, vidH);
    await pose.send({ image: poseInputCanvas });

    let box = null;
    if (poseLandmarks) {
      box = getCropBox(poseLandmarks, vidW, vidH, ratio, padding);
    }
    if (!box) {
      let cropW = vidH * ratio, cropH = vidH;
      if (cropW > vidW) { cropW = vidW; cropH = cropW / ratio; }
      box = { sx: (vidW - cropW) / 2, sy: (vidH - cropH) / 2, cropW, cropH };
    }

    boxBuf.push(box);
    if (boxBuf.length > smoothN) boxBuf.shift();
    const smoothed = smoothBoxes(boxBuf) || box;

    outCtx.drawImage(vid, smoothed.sx, smoothed.sy, smoothed.cropW, smoothed.cropH, 0, 0, outW, outH);

    if (fi % 5 === 0) {
      previewCanvas.width = outW; previewCanvas.height = outH;
      previewCanvas.getContext('2d').drawImage(offCanvas, 0, 0);
    }

    const pct = ((fi + 1) / totalFrames * 100).toFixed(1);
    progressFill.style.width = pct + '%';
    progressLabel.textContent = `처리 중... ${pct}% (${fi+1}/${totalFrames} 프레임)`;
    await new Promise(r => setTimeout(r, 0));
  }

  recorder.stop();
  await new Promise(r => { recorder.onstop = r; });

  outputBlob = new Blob(chunks, { type: recorder.mimeType });
  pose.close();
  vid.src = '';

  progressFill.style.width = '100%';
  progressLabel.textContent = '완료!';
  setStatus(`처리 완료 · ${(outputBlob.size / 1024 / 1024).toFixed(1)} MB`, 'ok');
  downloadBtn.disabled = false;
  processBtn.disabled = false;
  isProcessing = false;
}

downloadBtn.addEventListener('click', () => {
  if (!outputBlob) return;
  const ext = outputBlob.type.includes('webm') ? 'webm' : 'mp4';
  const a = document.createElement('a');
  a.href = URL.createObjectURL(outputBlob);
  a.download = `cropped_${selectedRatio.replace(':', 'x')}.${ext}`;
  a.click();
});

resetBtn.addEventListener('click', () => {
  if (isProcessing) return;
  videoFile = null; outputBlob = null;
  srcVideo.src = ''; fileInput.value = '';
  previewCard.style.display = 'none';
  processBtn.disabled = true; downloadBtn.disabled = true;
  progressWrap.style.display = 'none';
  progressFill.style.width = '0%';
  setStatus('');
});

function setStatus(msg, type) {
  statusEl.textContent = msg;
  statusEl.className = type || '';
}

function getSupportedMimeType() {
  const candidates = [
    'video/mp4;codecs=avc1',
    'video/mp4',
    'video/webm;codecs=vp9',
    'video/webm;codecs=vp8',
    'video/webm',
  ];
  for (const t of candidates) {
    if (MediaRecorder.isTypeSupported(t)) return t;
  }
  return '';
}
</script>
</body>
</html>
